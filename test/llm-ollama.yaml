apiVersion: v1
kind: Pod
metadata:
  name: ollama
spec:
  containers:
    - name: ollama
      image: ollama/ollama:latest
      ports:
        - containerPort: 11434
      resources:
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: models
          mountPath: /root/.ollama
  volumes:
    - name: models
      emptyDir: {}
