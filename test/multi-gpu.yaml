apiVersion: v1
kind: Pod
metadata:
  name: multi-gpu
spec:
  restartPolicy: Never
  containers:
    - name: multigpu
      image: nvcr.io/nvidia/pytorch:24.12-py3
      command: ["python3", "-c"]
      args:
        - |
          import torch
          n = torch.cuda.device_count()
          print(f'GPUs visible: {n}')
          for i in range(n):
              print(f'  [{i}] {torch.cuda.get_device_name(i)}')
          if n >= 2:
              a = torch.randn(4096, 4096, device='cuda:0')
              b = a.to('cuda:1')
              print(f'Transferred {a.numel()*4/1e6:.1f} MB between GPU 0 -> 1')
      resources:
        limits:
          nvidia.com/gpu: 2
