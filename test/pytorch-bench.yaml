apiVersion: v1
kind: Pod
metadata:
  name: pytorch-bench
spec:
  restartPolicy: Never
  containers:
    - name: bench
      image: nvcr.io/nvidia/pytorch:24.12-py3
      command: ["python3", "-c"]
      args:
        - |
          import torch, time
          d = torch.device('cuda')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          print(f'VRAM: {torch.cuda.get_device_properties(0).total_mem / 1e9:.1f} GB')
          for n in [1024, 4096, 8192]:
              a, b = torch.randn(n, n, device=d), torch.randn(n, n, device=d)
              torch.cuda.synchronize()
              t = time.time()
              for _ in range(10): torch.mm(a, b)
              torch.cuda.synchronize()
              ms = (time.time() - t) / 10 * 1000
              tflops = 2 * n**3 / (ms / 1000) / 1e12
              print(f'{n}x{n} matmul: {ms:.1f}ms ({tflops:.2f} TFLOPS)')
      resources:
        limits:
          nvidia.com/gpu: 1
